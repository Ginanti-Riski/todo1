<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" id="themeColor" content="#ffffff">
<title>Maria 💜</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet">
<style>
/* ── Reset & Base ───────────────────────────────────── */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html { height: 100%; -webkit-text-size-adjust: 100%; }

:root {
  --bg:         #ffffff;
  --bg2:        #f7f7f5;
  --bg3:        #f0efec;
  --surface:    #ffffff;
  --border:     #e8e8e4;
  --border2:    #d4d4cc;
  --text:       #1a1a18;
  --text2:      #6b6b65;
  --text3:      #a8a89e;
  --accent:     #1a1a18;
  --accent-inv: #ffffff;
  --red:        #e53e3e;
  --amber:      #d97706;
  --green:      #059669;
  --blue:       #2563eb;
  --radius-sm:  10px;
  --radius:     14px;
  --radius-lg:  20px;
  --radius-xl:  28px;
  --safe-top:   env(safe-area-inset-top, 0px);
  --safe-bot:   env(safe-area-inset-bottom, 0px);
  --nav-h:      64px;
}

.dark {
  --bg:         #111110;
  --bg2:        #1a1917;
  --bg3:        #232220;
  --surface:    #1e1d1b;
  --border:     #2a2926;
  --border2:    #383633;
  --text:       #f0efec;
  --text2:      #9c9b94;
  --text3:      #5c5b56;
  --accent:     #f0efec;
  --accent-inv: #111110;
}

body {
  font-family: 'DM Sans', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  overflow-x: hidden;
  transition: background .3s, color .3s;
  -webkit-font-smoothing: antialiased;
}

/* ── Welcome Screen ─────────────────────────────────── */
#welcomeScreen {
  position: fixed; inset: 0; z-index: 999;
  background: var(--bg);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 40px 32px;
  padding-top: calc(40px + var(--safe-top));
  transition: opacity .5s, transform .5s;
}
#welcomeScreen.out { opacity: 0; transform: scale(1.03); pointer-events: none; }

.w-emoji {
  font-size: 56px; margin-bottom: 28px;
  animation: float 4s ease-in-out infinite;
}
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }

.w-title {
  font-family: 'Instrument Serif', serif;
  font-size: clamp(32px, 8vw, 44px);
  line-height: 1.15;
  text-align: center;
  color: var(--text);
  margin-bottom: 14px;
}
.w-title em { font-style: italic; color: var(--text2); }

.w-sub {
  font-size: 15px;
  color: var(--text2);
  text-align: center;
  line-height: 1.65;
  max-width: 300px;
  margin-bottom: 48px;
  font-weight: 300;
}

.w-btn {
  background: var(--text);
  color: var(--bg);
  border: none;
  border-radius: 50px;
  padding: 16px 40px;
  font-size: 15px;
  font-weight: 600;
  font-family: 'DM Sans', sans-serif;
  cursor: pointer;
  transition: opacity .2s, transform .15s;
  letter-spacing: .2px;
}
.w-btn:active { opacity: .75; transform: scale(.98); }

.w-theme {
  position: absolute; top: calc(16px + var(--safe-top)); right: 20px;
  width: 40px; height: 40px;
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  font-size: 18px; cursor: pointer;
  transition: background .2s;
}

/* ── App Shell ──────────────────────────────────────── */
#app {
  display: none;
  flex-direction: column;
  min-height: 100dvh;
  padding-bottom: calc(var(--nav-h) + var(--safe-bot));
}
#app.show { display: flex; }

/* ── Top Header ─────────────────────────────────────── */
.topbar {
  position: sticky; top: 0; z-index: 100;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  padding: calc(var(--safe-top) + 12px) 20px 12px;
  display: flex; align-items: center; justify-content: space-between;
  gap: 12px;
}
.topbar-left { flex: 1; min-width: 0; }
.topbar-greeting {
  font-size: 11px;
  font-weight: 500;
  color: var(--text3);
  letter-spacing: .5px;
  text-transform: uppercase;
  margin-bottom: 1px;
}
.topbar-title {
  font-family: 'Instrument Serif', serif;
  font-size: 22px;
  font-style: italic;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.topbar-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

.icon-pill {
  position: relative;
  width: 38px; height: 38px;
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 17px; cursor: pointer;
  transition: background .15s, transform .1s;
  -webkit-user-select: none;
}
.icon-pill:active { transform: scale(.93); background: var(--bg3); }

.badge {
  position: absolute; top: -3px; right: -3px;
  min-width: 16px; height: 16px;
  background: var(--red); border: 2px solid var(--bg);
  border-radius: 50px;
  font-size: 9px; font-weight: 800; color: #fff;
  display: none; align-items: center; justify-content: center;
  padding: 0 3px; line-height: 1;
}
.badge.on { display: flex; }

.fab {
  background: var(--text); color: var(--bg);
  border: none; border-radius: 50px;
  padding: 9px 18px;
  font-size: 13px; font-weight: 600;
  font-family: 'DM Sans', sans-serif;
  display: flex; align-items: center; gap: 6px;
  cursor: pointer; transition: opacity .15s, transform .1s;
  white-space: nowrap;
}
.fab:active { opacity: .75; transform: scale(.97); }
.fab-icon { font-size: 16px; font-weight: 300; }

/* ── Bottom Nav ─────────────────────────────────────── */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
  background: var(--bg);
  border-top: 1px solid var(--border);
  padding-bottom: var(--safe-bot);
  display: flex;
}
.nav-tab {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 10px 4px;
  cursor: pointer;
  -webkit-user-select: none;
  transition: opacity .15s;
  position: relative;
}
.nav-tab:active { opacity: .6; }
.nav-icon { font-size: 22px; margin-bottom: 3px; transition: transform .2s; }
.nav-label {
  font-size: 10px; font-weight: 500; color: var(--text3);
  letter-spacing: .2px;
  transition: color .2s;
}
.nav-tab.active .nav-label { color: var(--text); font-weight: 600; }
.nav-tab.active .nav-icon { transform: scale(1.1); }
.nav-count {
  position: absolute; top: 6px; left: 50%; margin-left: 6px;
  min-width: 15px; height: 15px;
  background: var(--text); color: var(--bg);
  border-radius: 50px; font-size: 9px; font-weight: 800;
  display: none; align-items: center; justify-content: center;
  padding: 0 3px;
}
.nav-count.on { display: flex; }

/* ── Pages ──────────────────────────────────────────── */
.page { display: none; flex: 1; flex-direction: column; animation: fadeUp .25s ease; }
.page.active { display: flex; }
@keyframes fadeUp { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

/* ── Section Header ─────────────────────────────────── */
.section {
  padding: 20px 20px 0;
}
.section-head {
  display: flex; align-items: baseline; gap: 8px;
  margin-bottom: 14px;
}
.section-title {
  font-family: 'Instrument Serif', serif;
  font-size: 18px;
  font-style: italic;
  color: var(--text);
}
.section-num {
  font-size: 12px; font-weight: 600;
  color: var(--text3);
}

/* ── Card ───────────────────────────────────────────── */
.cards-list { display: flex; flex-direction: column; gap: 1px; }

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
  margin-bottom: 8px;
  position: relative;
  overflow: hidden;
  transition: transform .15s, box-shadow .15s;
  cursor: pointer;
}
.card:active { transform: scale(.99); }

/* Color strip left */
.card::before {
  content: '';
  position: absolute; left: 0; top: 0; bottom: 0;
  width: 3.5px;
  background: var(--card-color, #6c63ff);
  border-radius: 4px 0 0 4px;
}

.card-inner { padding-left: 10px; }

.card-header {
  display: flex; align-items: flex-start; justify-content: space-between;
  gap: 10px; margin-bottom: 5px;
}
.card-title {
  font-size: 15px; font-weight: 600;
  color: var(--text); line-height: 1.35;
  flex: 1;
}
.card.done .card-title { text-decoration: line-through; color: var(--text3); }
.card.done { opacity: .7; }

.prio-chip {
  flex-shrink: 0;
  width: 7px; height: 7px;
  border-radius: 50%; margin-top: 5px;
}
.prio-high { background: var(--red); box-shadow: 0 0 0 3px rgba(229,62,62,.15); }
.prio-medium { background: var(--amber); box-shadow: 0 0 0 3px rgba(217,119,6,.15); }
.prio-low { background: var(--green); box-shadow: 0 0 0 3px rgba(5,150,105,.15); }

.card-desc {
  font-size: 13px; color: var(--text2);
  line-height: 1.5; margin-bottom: 10px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.card-footer {
  display: flex; align-items: center; justify-content: space-between;
}
.card-date { font-size: 11.5px; color: var(--text3); font-weight: 500; }

.card-actions { display: flex; gap: 6px; }
.card-btn {
  border: 1px solid var(--border);
  background: var(--bg2);
  border-radius: 8px;
  padding: 5px 11px;
  font-size: 11px; font-weight: 600;
  font-family: 'DM Sans', sans-serif;
  color: var(--text2);
  cursor: pointer;
  transition: background .15s, color .15s, border-color .15s, transform .1s;
}
.card-btn:active { transform: scale(.95); }
.card-btn.ok:hover, .card-btn.ok:active { background: var(--green); color: #fff; border-color: var(--green); }
.card-btn.del:hover, .card-btn.del:active { background: var(--red); color: #fff; border-color: var(--red); }

/* Swipe hint on mobile */
.swipe-hint { font-size: 11px; color: var(--text3); text-align: center; padding: 8px; }

/* ── Empty State ────────────────────────────────────── */
.empty {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 60px 24px;
  text-align: center;
}
.empty-icon { font-size: 40px; margin-bottom: 12px; opacity: .45; }
.empty-text { font-size: 14px; color: var(--text3); line-height: 1.6; }

/* ── Today Page ─────────────────────────────────────── */
.today-scroll { overflow-y: auto; flex: 1; padding: 0 20px 20px; }

.priority-section { margin-bottom: 24px; }
.priority-label {
  font-size: 10px; font-weight: 700; letter-spacing: 1.5px;
  text-transform: uppercase; color: var(--text3);
  margin-bottom: 10px; margin-top: 18px;
  display: flex; align-items: center; gap: 6px;
}
.priority-label::after { content:''; flex:1; height:1px; background: var(--border); }

/* ── Schedule Page ──────────────────────────────────── */
.schedule-scroll { overflow-y: auto; flex: 1; padding: 0 20px 20px; }

.date-group { margin-bottom: 28px; }
.date-label {
  font-size: 12px; font-weight: 600;
  color: var(--text2);
  margin-bottom: 10px; margin-top: 20px;
  display: flex; align-items: center; gap: 8px;
}
.date-label-text {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 50px; padding: 3px 12px;
  font-size: 11.5px;
}
.date-label.tomorrow .date-label-text {
  background: var(--text); color: var(--bg);
  border-color: var(--text);
}
.date-label::after { content:''; flex:1; height:1px; background: var(--border); }

/* ── Board Page ─────────────────────────────────────── */
.board-scroll { overflow-x: auto; overflow-y: hidden; flex: 1; display: flex; padding: 16px; gap: 12px; }
.board-col {
  flex-shrink: 0;
  width: calc(80vw); max-width: 320px;
  display: flex; flex-direction: column;
}
.board-col-head {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 12px; padding: 0 2px;
}
.col-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.col-name { font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text2); flex:1; }
.col-cnt { font-size: 11px; font-weight: 600; color: var(--text3); background: var(--bg2); border: 1px solid var(--border); border-radius: 50px; padding: 1px 8px; }

.board-body {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 12px; min-height: 300px;
  flex: 1; overflow-y: auto;
  transition: background .2s, border-color .2s;
}
.board-body.over { background: var(--bg3); border-color: var(--border2); }

/* ── Completed Page ─────────────────────────────────── */
.completed-scroll { overflow-y: auto; flex: 1; padding: 0 20px 20px; }

/* ── Notification Sheet ─────────────────────────────── */
.sheet-overlay {
  position: fixed; inset: 0; z-index: 500;
  background: rgba(0,0,0,.35);
  backdrop-filter: blur(4px);
  opacity: 0; pointer-events: none;
  transition: opacity .25s;
}
.sheet-overlay.open { opacity: 1; pointer-events: all; }

.sheet {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 501;
  background: var(--bg);
  border-radius: var(--radius-xl) var(--radius-xl) 0 0;
  padding-bottom: var(--safe-bot);
  max-height: 80dvh;
  display: flex; flex-direction: column;
  transform: translateY(100%);
  transition: transform .3s cubic-bezier(.4,0,.2,1);
}
.sheet.open { transform: translateY(0); }

.sheet-handle {
  width: 36px; height: 4px;
  background: var(--border2); border-radius: 2px;
  margin: 12px auto 0;
  flex-shrink: 0;
}
.sheet-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 20px 12px; border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.sheet-title { font-size: 16px; font-weight: 700; color: var(--text); }
.sheet-actions { display: flex; gap: 8px; }
.sheet-act {
  font-size: 11px; font-weight: 600;
  border: 1px solid var(--border); border-radius: 8px;
  padding: 5px 10px; cursor: pointer;
  background: var(--bg2); color: var(--text2);
  transition: all .15s;
}
.sheet-act.danger { color: var(--red); border-color: rgba(229,62,62,.3); background: rgba(229,62,62,.06); }

.sheet-scroll { overflow-y: auto; flex: 1; padding: 8px; }
.notif-item {
  border-radius: var(--radius);
  padding: 12px 14px; margin-bottom: 4px;
  cursor: pointer; transition: background .15s;
  border-left: 2.5px solid transparent;
}
.notif-item:hover { background: var(--bg2); }
.notif-item.unread { border-left-color: var(--text); background: var(--bg2); }
.notif-item-title { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 3px; }
.notif-item-msg { font-size: 12px; color: var(--text2); line-height: 1.5; }
.notif-item-time { font-size: 11px; color: var(--text3); margin-top: 4px; }
.notif-go { font-size: 11px; color: var(--text2); font-weight: 600; margin-top: 3px; }

/* ── Modal / Drawer ─────────────────────────────────── */
.modal-overlay {
  position: fixed; inset: 0; z-index: 600;
  background: rgba(0,0,0,.4);
  backdrop-filter: blur(4px);
  opacity: 0; pointer-events: none;
  transition: opacity .25s;
}
.modal-overlay.open { opacity: 1; pointer-events: all; }

.modal-drawer {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 601;
  background: var(--bg);
  border-radius: var(--radius-xl) var(--radius-xl) 0 0;
  padding-bottom: var(--safe-bot);
  max-height: 96dvh;
  display: flex; flex-direction: column;
  transform: translateY(100%);
  transition: transform .35s cubic-bezier(.4,0,.2,1);
}
.modal-drawer.open { transform: translateY(0); }

.modal-handle {
  width: 36px; height: 4px;
  background: var(--border2); border-radius: 2px;
  margin: 12px auto 0; flex-shrink: 0;
}
.modal-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 20px 16px; border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.modal-title-text {
  font-family: 'Instrument Serif', serif;
  font-style: italic;
  font-size: 20px; color: var(--text);
}
.modal-close {
  width: 30px; height: 30px;
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 50%; font-size: 16px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; color: var(--text2);
  transition: background .15s;
}
.modal-close:active { background: var(--bg3); }

.modal-body { overflow-y: auto; flex: 1; padding: 20px; }

.field { margin-bottom: 18px; }
.field-label {
  display: block;
  font-size: 11px; font-weight: 700;
  letter-spacing: 1px; text-transform: uppercase;
  color: var(--text3); margin-bottom: 8px;
}
.field-input, .field-textarea {
  width: 100%;
  background: var(--bg2); border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px 14px;
  font-size: 16px; /* 16px prevents iOS zoom */
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  outline: none;
  transition: border-color .2s;
  -webkit-appearance: none;
  appearance: none;
}
.field-input:focus, .field-textarea:focus {
  border-color: var(--text);
}
.field-textarea { resize: none; min-height: 80px; }

/* Priority selector */
.prio-row { display: flex; gap: 8px; }
.prio-btn {
  flex: 1; padding: 10px 6px;
  border: 1.5px solid var(--border);
  background: var(--bg2); border-radius: var(--radius-sm);
  font-size: 12px; font-weight: 600;
  font-family: 'DM Sans', sans-serif;
  color: var(--text2); cursor: pointer;
  text-align: center; transition: all .15s;
}
.prio-btn:active { transform: scale(.97); }
.prio-btn.sel-high { background: rgba(229,62,62,.1); color: var(--red); border-color: rgba(229,62,62,.4); }
.prio-btn.sel-medium { background: rgba(217,119,6,.1); color: var(--amber); border-color: rgba(217,119,6,.4); }
.prio-btn.sel-low { background: rgba(5,150,105,.1); color: var(--green); border-color: rgba(5,150,105,.4); }

/* Color picker */
.color-row { display: flex; gap: 10px; flex-wrap: wrap; }
.c-dot {
  width: 30px; height: 30px; border-radius: 50%;
  cursor: pointer; border: 2.5px solid transparent;
  transition: transform .15s, border-color .15s;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; color: transparent;
}
.c-dot.on { border-color: var(--text); transform: scale(1.15); color: white; }

/* Modal save button */
.modal-footer { padding: 16px 20px; border-top: 1px solid var(--border); flex-shrink: 0; }
.save-btn {
  width: 100%;
  background: var(--text); color: var(--bg);
  border: none; border-radius: var(--radius);
  padding: 15px;
  font-size: 15px; font-weight: 700;
  font-family: 'DM Sans', sans-serif;
  cursor: pointer; transition: opacity .2s, transform .1s;
  letter-spacing: .2px;
}
.save-btn:active { opacity: .8; transform: scale(.99); }

/* ── Toast ──────────────────────────────────────────── */
.toasts {
  position: fixed; bottom: calc(var(--nav-h) + var(--safe-bot) + 12px); left: 16px; right: 16px;
  z-index: 999; display: flex; flex-direction: column; gap: 8px; align-items: center;
  pointer-events: none;
}
.toast {
  background: var(--text); color: var(--bg);
  border-radius: 50px; padding: 11px 20px;
  font-size: 13px; font-weight: 600;
  box-shadow: 0 4px 20px rgba(0,0,0,.2);
  animation: toastIn .3s ease;
  max-width: 340px; text-align: center;
}
@keyframes toastIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

/* ── Divider ────────────────────────────────────────── */
.divider { height: 1px; background: var(--border); margin: 0 20px; }

/* ── Scrollbar ──────────────────────────────────────── */
::-webkit-scrollbar { width: 3px; height: 3px; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
</style>
</head>
<body>

<!-- ── Welcome ─────────────────────────── -->
<div id="welcomeScreen">
  <button class="w-theme" onclick="toggleDark()" id="wThemeBtn">🌙</button>
  <div class="w-emoji">🌸</div>
  <div class="w-title">Untuk Cintaku,<br><em>Maria</em></div>
  <p class="w-sub">Kelola harimu dengan lebih ringan, lebih tenang, penuh cinta.</p>
  <button class="w-btn" onclick="enterApp()">Mulai Sekarang 💜</button>
</div>

<!-- ── App ────────────────────────────── -->
<div id="app">

  <!-- Topbar -->
  <header class="topbar">
    <div class="topbar-left">
      <div class="topbar-greeting" id="topGreeting">Selamat pagi</div>
      <div class="topbar-title" id="topTitle">Hari Ini</div>
    </div>
    <div class="topbar-right">
      <div class="icon-pill" onclick="toggleSheet()" id="notifBtn">
        🔔
        <span class="badge" id="notifBadge"></span>
      </div>
      <div class="icon-pill" onclick="toggleDark()" id="themeBtn">🌙</div>
      <button class="fab" onclick="openModal()">
        <span class="fab-icon">+</span> Baru
      </button>
    </div>
  </header>

  <!-- Pages -->
  <!-- TODAY -->
  <div class="page active" id="page-today">
    <div class="today-scroll" id="todayScroll">
      <div id="highSection">
        <div class="priority-label">🔴 Prioritas Tinggi</div>
        <div id="highList"></div>
      </div>
      <div id="normalSection">
        <div class="priority-label">Kegiatan Hari Ini</div>
        <div id="normalList"></div>
      </div>
    </div>
  </div>

  <!-- SCHEDULE -->
  <div class="page" id="page-schedule">
    <div class="schedule-scroll">
      <div id="scheduleContent"></div>
    </div>
  </div>

  <!-- BOARD -->
  <div class="page" id="page-board">
    <div class="board-scroll" id="boardScroll">
      <div class="board-col">
        <div class="board-col-head">
          <div class="col-dot" style="background:#ec4899"></div>
          <span class="col-name">Now</span>
          <span class="col-cnt" id="kc-now">0</span>
        </div>
        <div class="board-body" id="kd-now"
          ondragover="onDragOver(event,'now')" ondrop="onDrop(event,'now')" ondragleave="onDragLeave(event)">
        </div>
      </div>
      <div class="board-col">
        <div class="board-col-head">
          <div class="col-dot" style="background:#3b82f6"></div>
          <span class="col-name">Future</span>
          <span class="col-cnt" id="kc-future">0</span>
        </div>
        <div class="board-body" id="kd-future"
          ondragover="onDragOver(event,'future')" ondrop="onDrop(event,'future')" ondragleave="onDragLeave(event)">
        </div>
      </div>
      <div class="board-col">
        <div class="board-col-head">
          <div class="col-dot" style="background:#10b981"></div>
          <span class="col-name">Selesai</span>
          <span class="col-cnt" id="kc-completed">0</span>
        </div>
        <div class="board-body" id="kd-completed"
          ondragover="onDragOver(event,'completed')" ondrop="onDrop(event,'completed')" ondragleave="onDragLeave(event)">
        </div>
      </div>
    </div>
  </div>

  <!-- COMPLETED -->
  <div class="page" id="page-completed">
    <div class="completed-scroll">
      <div id="completedSection">
        <div class="priority-label">Semua yang Telah Selesai</div>
        <div id="completedList"></div>
      </div>
    </div>
  </div>

  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <div class="nav-tab active" id="nt-today" onclick="showPage('today')">
      <div class="nav-icon">🏠</div>
      <div class="nav-label">Hari Ini</div>
      <span class="nav-count" id="nc-today"></span>
    </div>
    <div class="nav-tab" id="nt-schedule" onclick="showPage('schedule')">
      <div class="nav-icon">📅</div>
      <div class="nav-label">Jadwal</div>
      <span class="nav-count" id="nc-schedule"></span>
    </div>
    <div class="nav-tab" id="nt-board" onclick="showPage('board')">
      <div class="nav-icon">🗂️</div>
      <div class="nav-label">Board</div>
    </div>
    <div class="nav-tab" id="nt-completed" onclick="showPage('completed')">
      <div class="nav-icon">✅</div>
      <div class="nav-label">Selesai</div>
      <span class="nav-count" id="nc-completed"></span>
    </div>
  </nav>
</div>

<!-- ── Notification Sheet ──────────────── -->
<div class="sheet-overlay" id="sheetOverlay" onclick="closeSheet()"></div>
<div class="sheet" id="notifSheet">
  <div class="sheet-handle"></div>
  <div class="sheet-header">
    <div class="sheet-title">🔔 Notifikasi</div>
    <div class="sheet-actions">
      <button class="sheet-act" onclick="triggerCheck()">🔄 Cek</button>
      <button class="sheet-act" onclick="resetNotif()">♻️ Reset</button>
      <button class="sheet-act danger" onclick="clearNotif()">🗑️ Hapus</button>
    </div>
  </div>
  <div class="sheet-scroll" id="sheetScroll"></div>
</div>

<!-- ── Modal Drawer ────────────────────── -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal()"></div>
<div class="modal-drawer" id="modalDrawer">
  <div class="modal-handle"></div>
  <div class="modal-head">
    <div class="modal-title-text" id="modalTitleText">Tugas Baru</div>
    <div class="modal-close" onclick="closeModal()">✕</div>
  </div>
  <div class="modal-body">
    <div class="field">
      <label class="field-label">Judul</label>
      <input type="text" class="field-input" id="fTitle" placeholder="Nama kegiatan..." autocomplete="off">
    </div>
    <div class="field">
      <label class="field-label">Catatan</label>
      <textarea class="field-textarea" id="fDesc" placeholder="Tambahan catatan..."></textarea>
    </div>
    <div class="field">
      <label class="field-label">Tanggal</label>
      <input type="date" class="field-input" id="fDate">
    </div>
    <div class="field">
      <label class="field-label">Prioritas</label>
      <div class="prio-row">
        <button class="prio-btn" id="pb-high" onclick="setPrio('high')">🔴 Tinggi</button>
        <button class="prio-btn sel-medium" id="pb-medium" onclick="setPrio('medium')">🟡 Sedang</button>
        <button class="prio-btn" id="pb-low" onclick="setPrio('low')">🟢 Rendah</button>
      </div>
    </div>
    <div class="field">
      <label class="field-label">Warna</label>
      <div class="color-row" id="colorRow"></div>
    </div>
  </div>
  <div class="modal-footer">
    <button class="save-btn" onclick="saveCard()">Simpan</button>
  </div>
</div>

<!-- Toasts -->
<div class="toasts" id="toasts"></div>

<script>
// ═══ STATE ═══════════════════════════════════════════════
const COLORS = ['#1a1a18','#3b82f6','#ec4899','#10b981','#f59e0b','#ef4444','#8b5cf6','#06b6d4'];
let cards   = [];
let editId  = null;
let dragId  = null;
let selColor = COLORS[0];
let selPrio  = 'medium';
let isDark   = false;
let curPage  = 'today';

// ═══ THEME ════════════════════════════════════════════════
function applyTheme() {
  document.body.classList.toggle('dark', isDark);
  const icon = isDark ? '☀️' : '🌙';
  ['themeBtn','wThemeBtn'].forEach(id => { const el = document.getElementById(id); if(el) el.textContent = icon; });
  document.getElementById('themeColor')?.setAttribute('content', isDark ? '#111110' : '#ffffff');
  localStorage.setItem('theme', isDark ? 'dark' : 'light');
}
function toggleDark() { isDark = !isDark; applyTheme(); }
(function() {
  isDark = localStorage.getItem('theme') === 'dark';
  applyTheme();
})();

// ═══ WELCOME ══════════════════════════════════════════════
function enterApp() {
  const ws = document.getElementById('welcomeScreen');
  ws.classList.add('out');
  setTimeout(() => {
    ws.style.display = 'none';
    document.getElementById('app').classList.add('show');
    updateGreeting();
    loadCards();
    loadNotifCount();
  }, 450);
}

function updateGreeting() {
  const h = new Date().getHours();
  const g = h < 11 ? 'Selamat pagi' : h < 15 ? 'Selamat siang' : h < 18 ? 'Selamat sore' : 'Selamat malam';
  document.getElementById('topGreeting').textContent = g + ', Maria 💜';
}

// ═══ NAVIGATION ══════════════════════════════════════════
const PAGE_TITLES = { today: 'Hari Ini', schedule: 'Jadwal', board: 'Board', completed: 'Selesai' };

function showPage(p) {
  curPage = p;
  document.querySelectorAll('.page').forEach(x => x.classList.remove('active'));
  document.getElementById('page-' + p).classList.add('active');
  document.querySelectorAll('.nav-tab').forEach(x => x.classList.remove('active'));
  document.getElementById('nt-' + p).classList.add('active');
  document.getElementById('topTitle').textContent = PAGE_TITLES[p];
  renderAll();
}

// ═══ API ══════════════════════════════════════════════════
async function loadCards() {
  try {
    const r = await fetch('/api/cards');
    cards = await r.json();
    renderAll();
    updateCounts();
  } catch { toast('Gagal memuat data', '❌'); }
}

async function loadNotifCount() {
  try {
    const r = await fetch('/api/notifications/unread-count');
    const d = await r.json();
    const b = document.getElementById('notifBadge');
    if (d.count > 0) { b.textContent = d.count > 99 ? '99+' : d.count; b.classList.add('on'); }
    else { b.textContent = ''; b.classList.remove('on'); }
  } catch {}
}

async function loadNotifPanel() {
  try {
    const r = await fetch('/api/notifications');
    const notifs = await r.json();
    const el = document.getElementById('sheetScroll');
    if (!notifs.length) {
      el.innerHTML = '<div class="empty"><div class="empty-icon">🔔</div><div class="empty-text">Tidak ada notifikasi</div></div>';
      return;
    }
    el.innerHTML = notifs.map(n => `
      <div class="notif-item ${n.is_read ? '' : 'unread'}" onclick="goToCard(${n.card_id})">
        <div class="notif-item-title">${esc(n.card_title)}</div>
        <div class="notif-item-msg">${esc(n.message)}</div>
        <div class="notif-item-time">${new Date(n.created_at).toLocaleString('id-ID')}</div>
        ${n.card_id ? '<div class="notif-go">→ Lihat tugas</div>' : ''}
      </div>`).join('');
    loadNotifCount();
  } catch {}
}

function goToCard(cardId) {
  if (!cardId) return;
  const card = cards.find(c => c.id === cardId);
  if (!card) { toast('Tugas tidak ditemukan', '⚠️'); return; }
  const target = card.status === 'completed' ? 'completed' : card.status === 'future' ? 'schedule' : 'today';
  showPage(target);
  closeSheet();
  setTimeout(() => {
    const el = document.querySelector(`[data-id="${cardId}"]`);
    if (el) {
      el.scrollIntoView({ behavior: 'smooth', block: 'center' });
      el.style.boxShadow = '0 0 0 2.5px var(--text)';
      setTimeout(() => el.style.boxShadow = '', 1800);
    }
  }, 300);
}

// ═══ RENDER ══════════════════════════════════════════════
function todayStr() { return new Date().toISOString().split('T')[0]; }

function renderAll() {
  renderToday();
  renderSchedule();
  renderBoard();
  renderCompleted();
  updateCounts();
}

function renderToday() {
  const nowCards = cards.filter(c => c.status === 'now');
  const high = nowCards.filter(c => c.priority === 'high');
  const rest = nowCards.filter(c => c.priority !== 'high');

  const highEl = document.getElementById('highList');
  const normalEl = document.getElementById('normalList');
  document.getElementById('highSection').style.display = high.length ? '' : 'none';

  highEl.innerHTML = high.length
    ? high.map(c => cardHTML(c)).join('')
    : '';

  normalEl.innerHTML = rest.length
    ? rest.map(c => cardHTML(c)).join('')
    : '<div class="empty"><div class="empty-icon">☀️</div><div class="empty-text">Tidak ada kegiatan hari ini</div></div>';
}

function renderSchedule() {
  const future = cards.filter(c => c.status === 'future');
  const el = document.getElementById('scheduleContent');
  if (!future.length) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">📅</div><div class="empty-text">Belum ada jadwal mendatang</div></div>';
    return;
  }
  const groups = {};
  future.forEach(c => { if (!groups[c.scheduled_date]) groups[c.scheduled_date] = []; groups[c.scheduled_date].push(c); });
  const tomorrow = new Date(); tomorrow.setDate(tomorrow.getDate()+1);
  const tmrStr = tomorrow.toISOString().split('T')[0];

  el.innerHTML = Object.keys(groups).sort().map(dk => {
    const isTmr = dk === tmrStr;
    const d = new Date(dk + 'T00:00:00');
    const DAYS = ['Min','Sen','Sel','Rab','Kam','Jum','Sab'];
    const MONTHS = ['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'];
    const label = `${DAYS[d.getDay()]}, ${d.getDate()} ${MONTHS[d.getMonth()]}`;
    const sorted = [...groups[dk]].sort((a,b) => ({high:0,medium:1,low:2}[a.priority]-{high:0,medium:1,low:2}[b.priority]));
    return `
      <div class="date-group">
        <div class="date-label ${isTmr ? 'tomorrow' : ''}">
          <span class="date-label-text">${isTmr ? '⏰ Besok — ' : ''}${label}</span>
        </div>
        ${sorted.map(c => cardHTML(c)).join('')}
      </div>`;
  }).join('');
}

function renderBoard() {
  const groups = { now: cards.filter(c=>c.status==='now'), future: cards.filter(c=>c.status==='future'), completed: cards.filter(c=>c.status==='completed') };
  ['now','future','completed'].forEach(s => {
    const el = document.getElementById('kd-' + s);
    document.getElementById('kc-' + s).textContent = groups[s].length;
    el.innerHTML = groups[s].length
      ? groups[s].map(c => cardHTML(c, true)).join('')
      : '<div class="empty" style="padding:30px 16px"><div class="empty-icon" style="font-size:28px">📭</div><div class="empty-text">Kosong</div></div>';
  });
}

function renderCompleted() {
  const comp = cards.filter(c => c.status === 'completed');
  document.getElementById('completedList').innerHTML = comp.length
    ? comp.map(c => cardHTML(c)).join('')
    : '<div class="empty"><div class="empty-icon">🌟</div><div class="empty-text">Belum ada yang selesai.<br>Semangat, Maria! 💜</div></div>';
}

function updateCounts() {
  const now  = cards.filter(c=>c.status==='now').length;
  const fut  = cards.filter(c=>c.status==='future').length;
  const comp = cards.filter(c=>c.status==='completed').length;

  const nc = (id, n) => {
    const el = document.getElementById(id);
    el.textContent = n || '';
    el.classList.toggle('on', n > 0);
  };
  nc('nc-today', now);
  nc('nc-schedule', fut);
  nc('nc-completed', comp);
}

function cardHTML(card, compact = false) {
  const MONTHS = ['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'];
  const d = new Date(card.scheduled_date + 'T00:00:00');
  const dateStr = `${d.getDate()} ${MONTHS[d.getMonth()]} ${d.getFullYear()}`;
  const isDone  = card.status === 'completed';
  const prioClass = `prio-${card.priority}`;
  const actions = isDone
    ? `<button class="card-btn del" onclick="event.stopPropagation();deleteCard(${card.id})">Hapus</button>`
    : `<button class="card-btn ok" onclick="event.stopPropagation();doneCard(${card.id})">✓ Selesai</button>
       <button class="card-btn" onclick="event.stopPropagation();openModal(${card.id})">Edit</button>
       <button class="card-btn del" onclick="event.stopPropagation();deleteCard(${card.id})">✕</button>`;

  return `
    <div class="card ${isDone ? 'done' : ''}"
         style="--card-color:${card.color}"
         data-id="${card.id}"
         draggable="true"
         ondragstart="onDragStart(event,${card.id})"
         ondragend="onDragEnd(event)">
      <div class="card-inner">
        <div class="card-header">
          <div class="card-title">${esc(card.title)}</div>
          <div class="prio-chip ${prioClass}"></div>
        </div>
        ${card.description ? `<div class="card-desc">${esc(card.description)}</div>` : ''}
        <div class="card-footer">
          <div class="card-date">📅 ${dateStr}</div>
          <div class="card-actions">${actions}</div>
        </div>
      </div>
    </div>`;
}

// ═══ DRAG & DROP ══════════════════════════════════════════
function onDragStart(e, id) { dragId = id; e.dataTransfer.effectAllowed = 'move'; setTimeout(()=>e.target.classList.add('dragging'),0); }
function onDragEnd(e) { e.target.classList.remove('dragging'); }
function onDragOver(e, col) { e.preventDefault(); document.getElementById('kd-'+col).classList.add('over'); }
function onDragLeave(e) { e.currentTarget.classList.remove('over'); }
async function onDrop(e, status) {
  e.preventDefault();
  document.querySelectorAll('.board-body').forEach(x => x.classList.remove('over'));
  if (!dragId) return;
  try {
    await fetch(`/api/cards/${dragId}`, { method:'PATCH', headers:{'Content-Type':'application/json'}, body: JSON.stringify({status}) });
    toast(`Dipindah ke ${status}`, '✓');
    await loadCards();
  } catch { toast('Gagal memindahkan', '❌'); }
  dragId = null;
}

// ═══ ACTIONS ══════════════════════════════════════════════
async function doneCard(id) {
  try {
    await fetch(`/api/cards/${id}`, { method:'PATCH', headers:{'Content-Type':'application/json'}, body: JSON.stringify({status:'completed'}) });
    toast('Tugas selesai! 🎉', '');
    await loadCards();
  } catch { toast('Gagal', '❌'); }
}

async function deleteCard(id) {
  if (!confirm('Hapus tugas ini?')) return;
  try {
    await fetch(`/api/cards/${id}`, { method:'DELETE' });
    toast('Dihapus', '🗑️');
    await loadCards();
  } catch { toast('Gagal menghapus', '❌'); }
}

// ═══ MODAL ════════════════════════════════════════════════
function buildColorPicker() {
  document.getElementById('colorRow').innerHTML = COLORS.map(c =>
    `<div class="c-dot ${c===selColor?'on':''}" style="background:${c}" data-c="${c}" onclick="setColor('${c}')">✓</div>`
  ).join('');
}
function setColor(c) {
  selColor = c;
  document.querySelectorAll('.c-dot').forEach(d => d.classList.toggle('on', d.dataset.c === c));
}
function setPrio(p) {
  selPrio = p;
  document.getElementById('pb-high').className   = 'prio-btn' + (p==='high'   ? ' sel-high'   : '');
  document.getElementById('pb-medium').className = 'prio-btn' + (p==='medium' ? ' sel-medium' : '');
  document.getElementById('pb-low').className    = 'prio-btn' + (p==='low'    ? ' sel-low'    : '');
}

function openModal(id = null) {
  editId   = id;
  selColor = COLORS[0];
  selPrio  = 'medium';

  if (id) {
    const c = cards.find(x => x.id === id);
    if (!c) return;
    document.getElementById('modalTitleText').textContent = 'Edit Tugas';
    document.getElementById('fTitle').value = c.title;
    document.getElementById('fDesc').value  = c.description || '';
    document.getElementById('fDate').value  = c.scheduled_date;
    selColor = c.color;
    selPrio  = c.priority || 'medium';
  } else {
    document.getElementById('modalTitleText').textContent = 'Tugas Baru';
    document.getElementById('fTitle').value = '';
    document.getElementById('fDesc').value  = '';
    document.getElementById('fDate').value  = todayStr();
  }
  setPrio(selPrio);
  buildColorPicker();
  document.getElementById('modalOverlay').classList.add('open');
  document.getElementById('modalDrawer').classList.add('open');
  setTimeout(() => document.getElementById('fTitle').focus(), 350);
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.getElementById('modalDrawer').classList.remove('open');
  editId = null;
}

async function saveCard() {
  const title = document.getElementById('fTitle').value.trim();
  const desc  = document.getElementById('fDesc').value.trim();
  const dt    = document.getElementById('fDate').value;
  if (!title || !dt) { toast('Judul dan tanggal wajib diisi', '⚠️'); return; }

  const body = JSON.stringify({ title, description: desc, scheduled_date: dt, color: selColor, priority: selPrio });
  try {
    if (editId) {
      await fetch(`/api/cards/${editId}`, { method:'PATCH', headers:{'Content-Type':'application/json'}, body });
      toast('Tugas diperbarui ✓', '');
    } else {
      await fetch('/api/cards', { method:'POST', headers:{'Content-Type':'application/json'}, body });
      toast('Tugas ditambahkan ✨', '');
    }
    closeModal();
    await loadCards();
    await loadNotifCount();
  } catch { toast('Gagal menyimpan', '❌'); }
}

// ═══ NOTIFICATIONS ════════════════════════════════════════
function toggleSheet() {
  const ol = document.getElementById('sheetOverlay');
  const sh = document.getElementById('notifSheet');
  const open = !sh.classList.contains('open');
  ol.classList.toggle('open', open);
  sh.classList.toggle('open', open);
  if (open) loadNotifPanel();
}
function closeSheet() {
  document.getElementById('sheetOverlay').classList.remove('open');
  document.getElementById('notifSheet').classList.remove('open');
}

async function triggerCheck() {
  try {
    await fetch('/api/notifications/trigger', { method:'POST' });
    await loadNotifPanel();
    await loadNotifCount();
    toast('Notifikasi dicek ✓', '');
  } catch { toast('Gagal', '❌'); }
}
async function resetNotif() {
  if (!confirm('Reset & kirim ulang notifikasi?')) return;
  try {
    await fetch('/api/notifications/reset-sent', { method:'POST' });
    await fetch('/api/notifications/trigger', { method:'POST' });
    await loadNotifPanel();
    await loadNotifCount();
    toast('Reset berhasil ✓', '');
  } catch { toast('Gagal reset', '❌'); }
}
async function clearNotif() {
  await fetch('/api/notifications/mark-read', { method:'POST' });
  document.getElementById('sheetScroll').innerHTML = '<div class="empty"><div class="empty-icon">🔔</div><div class="empty-text">Tidak ada notifikasi</div></div>';
  loadNotifCount();
  toast('Notifikasi dihapus', '🗑️');
}

// ═══ TOAST ════════════════════════════════════════════════
function toast(msg, icon = '') {
  const wrap = document.getElementById('toasts');
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = (icon ? icon + ' ' : '') + msg;
  wrap.appendChild(el);
  setTimeout(() => { el.style.opacity = '0'; el.style.transform = 'translateY(6px)'; el.style.transition = 'all .3s'; setTimeout(()=>el.remove(), 300); }, 2800);
}

function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ═══ KEYBOARD & INTERVALS ════════════════════════════════
document.addEventListener('keydown', e => { if (e.key === 'Escape') { closeModal(); closeSheet(); } });
setInterval(loadNotifCount, 60000);
</script>
</body>
</html>
